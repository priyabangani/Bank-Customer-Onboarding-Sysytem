# Server Port
server.port=8080

# Spring Datasource Configuration (for MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/onboarding_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=your_db_username
spring.datasource.password=your_db_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update # Options: create, create-drop, update, validate, none
spring.jpa.show-sql=true              # Set to false in production
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect # Or your specific MySQL version dialect

# Spring Security Configuration (Optional, if you want to customize further)
# spring.security.user.name=admin
# spring.security.user.password=password

# Thymeleaf Configuration (if you're using Thymeleaf for your views)
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML

# Other potential configurations (e.g., for logging)
logging.level.org.springframework.web=DEBUG